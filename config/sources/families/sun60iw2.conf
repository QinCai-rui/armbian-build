fi

zenity --question \
    --title="Install Sway Desktop?" \
    --text="A lightweight Wayland/Vulkan desktop (Sway) is available.\n\nSway uses native Vulkan and ~50MB RAM vs ~400MB for XFCE.\nRecommended for this 1GB board.\n\nInstall Sway?" \
