		LINUXCONFIG="linux-sun60iw2-${BRANCH}"
		NAME_INITRD="initrd.img-6.6.98-vendor-sun60iw2"
		declare -g SERIALCON="ttyAS0"
		
		;;
esac


function build_custom_uboot() {
    display_alert "Checking for local Radxa U-Boot blob" "${BOARD}" "info"

    # Define local path
    local local_blob_dir="${SRC}/packages/blobs/sunxi/sun60iw2"
    local local_blob=$(ls ${local_blob_dir}/u-boot-aw2501*.deb 2>/dev/null | head -n 1)

    if [[ -f "${local_blob}" ]]; then
        display_alert "Using local blob: $(basename "${local_blob}")" "${BOARD}" "info"
        DEB_VENDOR_BLOB="${local_blob}"
        DOWNLOAD_DIR="" # Prevent cleanup of local source
    else
        display_alert "Local blob not found, retrieving latest from GitHub" "${BOARD}" "info"
        api_url="https://api.github.com/repos/radxa-pkg/u-boot-aw2501/releases/latest"
        latest_version=$(curl -s "${api_url}" | jq -r '.tag_name')
        
        DOWNLOAD_URL="https://github.com/radxa-pkg/u-boot-aw2501/releases/download/${latest_version}/u-boot-aw2501_${latest_version}_all.deb"
        
        DOWNLOAD_DIR=$(mktemp -d)
        DEB_VENDOR_BLOB="${DOWNLOAD_DIR}/u-boot-aw2501_${latest_version}_all.deb"
        wget ${DOWNLOAD_URL} -P ${DOWNLOAD_DIR}
    fi

    [[ -z "${uboottempdir:-}" ]] && exit_with_error "uboottempdir is not set by caller"
    [[ -z "${uboot_name:-}" ]] && exit_with_error "uboot_name is not set by caller"

    # 4. Extract and Repackage
    vendortmp=$(mktemp -d)
    ( cd "${vendortmp}" && dpkg-deb -x "${DEB_VENDOR_BLOB}" . ) || {
        rm -rf "${vendortmp}" ${DOWNLOAD_DIR}
        exit_with_error "Failed to extract vendor .deb: ${DEB_VENDOR_BLOB}"
    }

    mkdir -p "${uboottempdir}/usr/lib/${uboot_name}"

    local srcdir="${vendortmp}/usr/lib/u-boot/radxa-cubie-a7a"

    if [[ -n "${srcdir}" ]]; then
        local required_files=("boot0_sdcard.bin" "boot0_ufs.bin" "boot_package.fex")
        local found_any=false

        for filename in "${required_files[@]}"; do
            local src_file="${srcdir}/${filename}"
            local dest_dir="${uboottempdir}/usr/lib/${uboot_name}/"

            if [[ -f "${src_file}" ]]; then
                if cp "${src_file}" "${dest_dir}"; then
                    display_alert "Successfully copied ${filename}" "${BOARD}" "info"
                    found_any=true
                else
                    display_alert "Failed to copy ${filename} to destination" "${BOARD}" "err"
                fi
            else
                display_alert "Required file missing from vendor package: ${filename}" "${BOARD}" "warn"
            fi
        done

        if [[ "${found_any}" == "false" ]]; then
            rm -rf "${vendortmp}" ${DOWNLOAD_DIR}
            exit_with_error "Critical: No boot binaries were found in ${srcdir}"
        fi
    else
        rm -rf "${vendortmp}" ${DOWNLOAD_DIR}
        exit_with_error "Vendor package layout not found for board: ${BOARD}"
    fi

    # 5. Cleanup temporary extraction files (leaves local .deb intact)
    rm -rf "${vendortmp}" ${DOWNLOAD_DIR}

    declare -g EXTENSION_BUILT_UBOOT="yes"

    return 0
}


function kernel_copy_extra_sources__radxa_allwinner_bsp() {
	display_alert "$BOARD" "Retrieving latest Radxa Allwinner BSP (Board Support Package)" "info"

	local bsp_branch="${BSPBRANCH#*:}"
	local bsp_dir="${SRC}/cache/sources/${LINUXSOURCEDIR}/bsp"

	if [[ -d "${bsp_dir}" ]]; then
	    rm -rf "${bsp_dir}"
	fi

	run_host_command_logged git clone \
	    --branch "${bsp_branch}" \
	    --depth 1 \
	    "${ALLWINNER_BSP_SOURCE}" "${bsp_dir}"

	if [[ ! -d "${bsp_dir}" ]]; then
	    exit_with_error "BSP clone failed - directory not found: ${bsp_dir}"
	fi

    	local expected_dir="${kernel_work_dir}/bsp"
    
    	CURRENT_BSP_HASH=$(git ls-remote "${ALLWINNER_BSP_SOURCE}" "${BSPBRANCH#*:}" | awk '{print $1}' | cut -c1-10)
    
    	local PATCH_ARCHIVE_DIR="${SRC}/patch/kernel/archive/sun60iw2-${BRANCH}"
	local EXISTING_BSP_FILE=""
	local EXISTING_BSP_HASH=""
	if compgen -G "${PATCH_ARCHIVE_DIR}/0011-Add-BSP-support-files-"*.patch > /dev/null; then
    		EXISTING_BSP_FILE=$(basename "$(ls "${PATCH_ARCHIVE_DIR}/0011-Add-BSP-support-files-"*.patch 2>/dev/null | head -n 1)")
    		EXISTING_BSP_HASH=$(echo "${EXISTING_BSP_FILE}" | grep -oP 'files-\K[a-f0-9]+(?=\.patch)')
	fi
    
    local PATCH_TARGET_DIR="${SRC}/cache/patch/radxa-${BRANCH}"
    mkdir -p "${PATCH_TARGET_DIR}"
    
    local PATCH_NAME="0011-Add-BSP-support-files-${CURRENT_BSP_HASH}.patch"
    local FULL_PATCH_PATH="${PATCH_TARGET_DIR}/${PATCH_NAME}"

    if [[ -f "${FULL_PATCH_PATH}" ]] || [[ -n "${CURRENT_BSP_HASH}" && "${CURRENT_BSP_HASH}" == "${EXISTING_BSP_HASH}" ]]; then
        display_alert "$BOARD" "BSP patch for hash ${CURRENT_BSP_HASH} exists. Skipping." "info"
        return 0
    fi
    
    display_alert "$BOARD" "New remote state detected (${CURRENT_BSP_HASH}). Updated patches stored in ${FULL_PATCH_PATH}" "info"
    rm -f "${PATCH_TARGET_DIR}/0010-BSP-Autogen-File.patch"
    rm -f "${PATCH_TARGET_DIR}"/0011-Add-BSP-support-files-*.patch

    if [[ -d "${expected_dir}" ]]; then
        run_host_command_logged cp "${expected_dir}"/configs/linux-${KERNEL_MAJOR_MINOR}/*.dtsi "${kernel_work_dir}"/arch/arm64/boot/dts/allwinner
        run_host_command_logged cp -r "${expected_dir}"/include/dt-bindings/. "${kernel_work_dir}"/include/dt-bindings

        local insert_text="\
export BSP_TOP := bsp/\n\
export LICHEE_KERN_DIR := ./\n\
export KBUILD_DEFCONFIG := bsp.config\n\
"
        sed -i "/# expect to learn how to build the kernel reading this file./a\\
${insert_text}" "${kernel_work_dir}/Makefile"

		local bsp_patch_file="${PATCH_TARGET_DIR}/0010-BSP-Autogen-File.patch"
        local autogen_content="#define AW_BSP_VERSION \"${CURRENT_BSP_HASH}, $(date "+%Y-%m-%d %H:%M:%S"), RadxaOS SDK\""
        mkdir -p "${expected_dir}/include"
        echo "${autogen_content}" > "${expected_dir}/include/sunxi-autogen.h"
        
        display_alert "$BOARD" "Generating 0010-BSP-Autogen-File.patch" "info"
        (
        	{  
            	echo "--- /dev/null"
            	echo "+++ b/bsp/include/sunxi-autogen.h"
            	echo "@@ -0,0 +1 @@"
            	echo "+${autogen_content}"  
        	} > "${bsp_patch_file}"
        	
        	display_alert "$BOARD" "Generating ${PATCH_NAME}" "info"
            cd "${kernel_work_dir}" || exit_with_error "Failed to cd to kernel_work_dir"
            git config user.email "support@armbian.com"
            git config user.name "Armbian Builder"

            git add Makefile
            git add arch/arm64/boot/dts/allwinner/*.dtsi
            git add include/dt-bindings/
            
            git commit -m "Add BSP support files ${CURRENT_BSP_HASH}"
            git format-patch -1 --stdout > "${FULL_PATCH_PATH}"
            
            git reset --hard HEAD~1
            git clean -fd
        ) || exit_with_error "BSP patch generation failed"
    else
        display_alert "Radxa Allwinner BSP not found." "${BOARD}" "err"
    fi
}


function kernel_copy_extra_sources__radxa_allwinner_device() {
    display_alert "$BOARD" "Retrieving latest Radxa Allwinner Device" "info"
    
    local REMOTE_BRANCH_NAME="${DEVICEBRANCH#*:}"
    local CURRENT_REMOTE_HASH=$(git ls-remote "${ALLWINNER_DEVICE_SOURCE}" "refs/heads/${REMOTE_BRANCH_NAME}" | awk '{print substr($1,1,10)}')
    
    if [[ -z "${CURRENT_REMOTE_HASH}" ]]; then
        display_alert "$BOARD" "Could not retrieve remote hash for ${REMOTE_BRANCH_NAME}. Proceeding with caution." "err"
    fi

    local PATCH_ARCHIVE_DIR="${SRC}/patch/kernel/archive/sun60iw2-${BRANCH}"
    local EXISTING_PATCH_FILE=""
    local EXISTING_PATCH_HASH=""
    if compgen -G "${PATCH_ARCHIVE_DIR}/0012-Add-Allwinner-Device-a733-"*.patch > /dev/null; then
        EXISTING_PATCH_FILE=$(basename "$(ls "${PATCH_ARCHIVE_DIR}/0012-Add-Allwinner-Device-a733-"*.patch 2>/dev/null | head -n 1)")
        EXISTING_PATCH_HASH=$(echo "${EXISTING_PATCH_FILE}" | grep -oP 'a733-\K[a-f0-9]+(?=\.patch)')
    fi

    local PATCH_TARGET_DIR="${SRC}/cache/patch/radxa-${BRANCH}"
    mkdir -p "${PATCH_TARGET_DIR}"
    
    local PATCH_NAME="0012-Add-Allwinner-Device-a733-${CURRENT_REMOTE_HASH}.patch"
    local FULL_PATCH_PATH="${PATCH_TARGET_DIR}/${PATCH_NAME}"

    if [[ -f "${FULL_PATCH_PATH}" ]] || [[ -n "${CURRENT_REMOTE_HASH}" && "${CURRENT_REMOTE_HASH}" == "${EXISTING_PATCH_HASH}" ]]; then
        display_alert "$BOARD" "Device patch for hash ${CURRENT_REMOTE_HASH} exists. Skipping." "info"
        return 0
    fi

    display_alert "$BOARD" "New remote state detected (${CURRENT_REMOTE_HASH}). Updated patch stored in ${FULL_PATCH_PATH}" "info"
    rm -f "${PATCH_TARGET_DIR}"/0012-Add-Allwinner-Device-a733*.patch
    
	local device_branch="${DEVICEBRANCH#*:}"
	local device_dir="${SRC}/cache/sources/allwinner-device"

	if [[ -d "${device_dir}" ]]; then
		rm -rf "${device_dir}"
	fi

	run_host_command_logged git clone \
		--branch "${device_branch}" \
		--depth 1 \
		"${ALLWINNER_DEVICE_SOURCE}" "${device_dir}"

	if [[ ! -d "${device_dir}" ]]; then
		exit_with_error "Device clone failed - directory not found: ${device_dir}"
	fi
    
    local expected_dir="${SRC}/cache/sources/allwinner-device"
    
    if [[ -d "${expected_dir}" ]]; then
        run_host_command_logged cp "${expected_dir}/configs/cubie_a7a/linux-${KERNEL_MAJOR_MINOR}/board.dts" "${kernel_work_dir}/arch/arm64/boot/dts/allwinner/sun60i-a733-cubie-a7a.dts"
        run_host_command_logged cp "${expected_dir}/configs/cubie_a7s/linux-${KERNEL_MAJOR_MINOR}/board.dts" "${kernel_work_dir}/arch/arm64/boot/dts/allwinner/sun60i-a733-cubie-a7s.dts"
        run_host_command_logged cp "${expected_dir}/configs/cubie_a7z/linux-${KERNEL_MAJOR_MINOR}/board.dts" "${kernel_work_dir}/arch/arm64/boot/dts/allwinner/sun60i-a733-cubie-a7z.dts"
        run_host_command_logged cp "${expected_dir}/configs/default/linux-${KERNEL_MAJOR_MINOR}/bsp_defconfig" "${kernel_work_dir}/arch/arm64/configs/bsp.config"
        
        display_alert "$BOARD" "Generating ${PATCH_NAME}" "info"
        (
            cd "${kernel_work_dir}" || exit_with_error "Failed to cd to kernel_work_dir"
            git config user.email "support@armbian.com"
            git config user.name "Armbian Builder"
            git add .
            git commit -m "Add Allwinner Device a733 ${CURRENT_REMOTE_HASH}"
            git format-patch -1 --stdout > "${FULL_PATCH_PATH}"
            
            git reset --hard HEAD~1
            git clean -fd
        ) || exit_with_error "Device patch generation failed"
    else
        display_alert "Radxa Allwinner Device not found." "${BOARD}" "err"
    fi
}


function post_family_tweaks__install_kmscon_console() {
    display_alert "Installing KMSCON (KMS/DRM-based system console)" "${BOARD}" "info"

    local HOST_DEB_PATH="${SRC}/packages/blobs/sunxi/sun60iw2"
    local TMP_DEB_DIR="/tmp/kmscon_debs"
    local TARGET_WANTS_DIR="/etc/systemd/system/getty.target.wants"
    local TARGET_SERVICE_FILE="/usr/lib/systemd/system/kmsconvt@.service"
    local OVERRIDE_DIR="${SDCARD}/etc/systemd/system/kmsconvt@tty1.service.d"

    # --- Install runtime dependencies ---
    chroot "$SDCARD" /bin/bash <<- 'EOF'
        set -e
        apt-get update
        apt-get install -y --no-install-recommends \
            libegl1 libgbm1 libgles2 \
            libpango-1.0-0 libpangoft2-1.0-0 libxkbcommon0
	EOF
    [[ $? -ne 0 ]] && exit_with_error "KMSCON: failed to install runtime dependencies"

    # --- Try package manager first, fall back to local debs ---
    chroot "$SDCARD" /bin/bash <<- 'EOF'
        . /etc/os-release

        if apt-get install -y --no-install-recommends libtsm4 kmscon 2>/dev/null; then
            echo "KMSCON: installed from default repos"
        elif [[ "$VERSION_CODENAME" == "trixie" ]]; then
            echo "KMSCON: on trixie, trying backports..."
            echo "deb http://deb.debian.org/debian trixie-backports main" \
                > /etc/apt/sources.list.d/trixie-backports.list
            apt-get update
            apt-get install -y --no-install-recommends -t trixie-backports libtsm4 kmscon \
                && echo "KMSCON: installed from trixie-backports" \
                || exit 2
            rm -f /etc/apt/sources.list.d/trixie-backports.list
        else
            echo "KMSCON: not available on ${VERSION_CODENAME}, signalling fallback"
            exit 2
        fi
	EOF

    local chroot_exit=$?
    if [[ $chroot_exit -eq 2 ]]; then
        display_alert "KMSCON: falling back to local .deb packages" "${BOARD}" "wrn"

        mkdir -p "${SDCARD}${TMP_DEB_DIR}"
        cp "${HOST_DEB_PATH}/kmscon_9.2.1-1_arm64.deb"  "${SDCARD}${TMP_DEB_DIR}/"
        cp "${HOST_DEB_PATH}/libtsm4_4.3.0-1_arm64.deb" "${SDCARD}${TMP_DEB_DIR}/"

        chroot "$SDCARD" /bin/bash <<- EOF
            set -e
            cd ${TMP_DEB_DIR}
            dpkg -i *.deb
            rm -rf ${TMP_DEB_DIR}
		EOF

        [[ $? -ne 0 ]] && exit_with_error "KMSCON: local .deb install also failed"

    elif [[ $chroot_exit -ne 0 ]]; then
        exit_with_error "KMSCON: failed to install kmscon"
    fi

    # --- Configure systemd ---
    mkdir -p "${SDCARD}${TARGET_WANTS_DIR}"
    mkdir -p "$OVERRIDE_DIR"

    chroot "$SDCARD" /bin/bash -c "
        set -e
        rm -f '${TARGET_WANTS_DIR}/getty@tty1.service'
        ln -sf '${TARGET_SERVICE_FILE}' '${TARGET_WANTS_DIR}/kmsconvt@tty1.service'
        ln -sf '${TARGET_SERVICE_FILE}' '/etc/systemd/system/autovt@.service'
    " || exit_with_error "KMSCON: failed to configure systemd symlinks"

    cat > "${OVERRIDE_DIR}/override.conf" <<- 'EOF'
	[Service]
	ExecStart=
	ExecStart=-/usr/bin/kmscon --vt tty1 --login -- /bin/bash --login
	EOF

    display_alert "KMSCON installed and configured successfully" "${BOARD}" "info"
}


function post_family_tweaks__install_gpu_desktop() {
    [[ "${BUILD_DESKTOP}" != "yes" ]] && return 0

    # =========================================================
    # Detect Debian version
    # =========================================================
    local DISTRO_ID
    local DEBIAN_VER

    read -r DISTRO_ID DEBIAN_VER < <(
        chroot "${SDCARD}" bash -c '. /etc/os-release; echo "$ID $VERSION_ID"'
    )

    if [[ "${DISTRO_ID}" != "debian" ]]; then
        display_alert "Skipping GPU stack: not Debian (${DISTRO_ID})" "${BOARD}" "info"
        return 0
    fi

    display_alert "Installing Radxa Allwinner GPU stack (Debian ${DEBIAN_VER})" "${BOARD}" "info"

    # =========================================================
    # Paths
    # =========================================================
    local CHROOT_TMP="/tmp/gpu"
    local RADXA_CORE_RELEASE="1.4.6-4"
    local CORE_BASE="https://github.com/radxa-pkg/allwinner-prebuilt/releases/download/${RADXA_CORE_RELEASE}"

    mkdir -p "${SDCARD}${CHROOT_TMP}"

    # =========================================================
    # Helpers
    # =========================================================
    download_core() {
        local name="$1"

        wget -q --show-progress \
            "${CORE_BASE}/${name}" \
            -O "${SDCARD}${CHROOT_TMP}/${name}" \
        || exit_with_error "CORE download failed: ${name}"
    }

    install_debs() {
        chroot "${SDCARD}" bash -c "
            dpkg -i --force-overwrite --force-conflicts ${CHROOT_TMP}/*.deb || true
            apt-get -f install -y
        " || exit_with_error "dpkg install failed"

        rm -f "${SDCARD}${CHROOT_TMP}"/*.deb
    }

    install_with_fallback() {
        local pkg="$1"
        local deb="$2"

        if ! chroot "${SDCARD}" apt-get install -y "${pkg}"; then
            display_alert "Fallback ${pkg}" "${BOARD}" "wrn"

            mkdir -p "${SDCARD}${CHROOT_TMP}"
            cp "${deb}" "${SDCARD}${CHROOT_TMP}/"

            chroot "${SDCARD}" bash -c "
                dpkg -i --force-overwrite --force-conflicts ${CHROOT_TMP}/$(basename "${deb}") || true
                apt-get -f install -y
            " || exit_with_error "Fallback install failed: ${pkg}"
        fi
    }

    # =========================================================
    # Mesa (safe baseline)
    # =========================================================
    chroot "${SDCARD}" bash -c "
        apt-get update &&
        apt-get install -y --no-install-recommends \
            libglx-mesa0 mesa-utils \
            libdrm2 libgbm1 libegl1
    " || exit_with_error "Mesa install failed"

    # =========================================================
    # XSERVER
    # =========================================================
    display_alert "Installing Xserver vendor stack" "${BOARD}" "info"

    download_core "xserver-xorg-img-bxm_1.21.1-2_arm64.deb"

    chroot "${SDCARD}" bash -c "
        dpkg -i --force-overwrite --force-conflicts --force-depends \
            ${CHROOT_TMP}/xserver-xorg-img-bxm_1.21.1-2_arm64.deb || true
        apt-get -f install -y
    "

    rm -f "${SDCARD}${CHROOT_TMP}"/*.deb

    # =========================================================
    # SYSTEM LIBS (fallback)
    # =========================================================
    display_alert "Installing system dependencies" "${BOARD}" "info"

    install_with_fallback libxcb-dri2-0 \
        "${SRC}/packages/blobs/sunxi/sun60iw2/libxcb-dri2-0_1.14-3_arm64.deb"

    install_with_fallback libssl1.1 \
        "${SRC}/packages/blobs/sunxi/sun60iw2/libssl1.1_1.1.1w-0+deb11u5_arm64.deb"

    # =========================================================
    # LIGHTDM FIX
    # =========================================================
    mkdir -p "${SDCARD}/etc/systemd/system/lightdm.service.d"

    cat > "${SDCARD}/etc/systemd/system/lightdm.service.d/armbian-pvr.conf" << 'EOF'
[Unit]
After=systemd-user-sessions.service accounts-daemon.service
Wants=accounts-daemon.service

[Service]
ExecStartPre=/bin/mkdir -p /var/lib/lightdm/data
ExecStartPre=/bin/chown lightdm:lightdm /var/lib/lightdm/data

[Install]
WantedBy=graphical.target
EOF

    # =========================================================
    # ISP / NPU
    # =========================================================
    display_alert "Installing ISP / AWISP / NPU stack" "${BOARD}" "info"

    download_core "libAWIspApi_602_1.0.0_arm64.deb"
    download_core "libcedarc-dev_2.0.0_arm64.deb"
    download_core "npu-runtime_2.0.3_arm64.deb"

    install_debs

    # =========================================================
    # BLACKLIST DEBIAN GSTREAMER (prevent apt pulling them back)
    # =========================================================
    if [[ "${DEBIAN_VER}" == "13" ]]; then

        mkdir -p "${SDCARD}/etc/apt/preferences.d"

        cat > "${SDCARD}/etc/apt/preferences.d/gstreamer" << 'EOF'
Package: gstreamer1.0-*
Pin: origin "deb.debian.org"
Pin-Priority: -1

Package: gstreamer1.0-*
Pin: origin "security.debian.org"
Pin-Priority: -1

Package: libgstreamer*
Pin: origin "deb.debian.org"
Pin-Priority: -1

Package: libgstreamer*
Pin: origin "security.debian.org"
Pin-Priority: -1

Package: gir1.2-gstreamer-*
Pin: origin "deb.debian.org"
Pin-Priority: -1

Package: gir1.2-gstreamer-*
Pin: origin "security.debian.org"
Pin-Priority: -1

Package: gir1.2-gst-plugins-*
Pin: origin "deb.debian.org"
Pin-Priority: -1

Package: gir1.2-gst-plugins-*
Pin: origin "security.debian.org"
Pin-Priority: -1
EOF

        # =========================================================
        # REMOVE DEBIAN GSTREAMER (before installing Radxa versions)
        # =========================================================
        display_alert "Removing Debian GStreamer packages" "${BOARD}" "info"

        chroot "${SDCARD}" apt-get remove -y --allow-change-held-packages \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-tools \
            gstreamer1.0-alsa \
            gstreamer1.0-gtk3 \
            gstreamer1.0-pulseaudio \
            gstreamer1.0-x \
            gstreamer1.0-opencv \
            libgstreamer1.0-0 \
            libgstreamer-plugins-base1.0-0 \
            libgstreamer-plugins-bad1.0-0 \
            libgstreamer-gl1.0-0 \
            libgstreamer-opencv1.0-0 \
            gir1.2-gstreamer-1.0 \
            gir1.2-gst-plugins-base-1.0 \
            gir1.2-gst-plugins-bad-1.0 \
            2>/dev/null || true

        # =========================================================
        # GSTREAMER DEPS
        # =========================================================
        display_alert "Installing GStreamer" "${BOARD}" "info"

        chroot "${SDCARD}" apt-get install -y \
            liba52-0.7.4 libmpeg2-4 libsidplay1v5 \
            libass9 libavtp0 libbs2b0 libchromaprint1 libcpuinfo0 \
            libdc1394-25 libdca0 libdnnl3.6 libdvdnav4 libfaad2 \
            libflite1 libfluidsynth3 libfreeaptx0 libgme0 libgssdp-1.6-0 \
            libgupnp-1.6-0 libgupnp-igd-1.6-0 libinstpatch-1.0-2 \
            liblc3-1 libldacbt-enc2 liblrdf0 libltc11 \
            libmjpegutils-2.1-0t64 libmodplug1 libmpcdec6 \
            libmpeg2encpp-2.1-0t64 libmplex2-2.1-0t64 libneon27t64 \
            libnice10 libonnx1t64 libonnxruntime1.21 libopenal-data \
            libopenal1 libopenmpt0t64 libopenni2-0 libpthreadpool0 \
            libraptor2-0 libre2-11 libsdl2-2.0-0 libsoundtouch1 \
            libspandsp2t64 libsrt1.5-gnutls libsrtp2-1 libunibreak6 \
            libvo-aacenc0 libvo-amrwbenc0 libwildmidi2 \
            libxnnpack0.20241108 libxslt1.1 libxss1 libyajl2 \
            libzbar0t64 libzxing3 timgm6mb-soundfont \
        || exit_with_error "GStreamer deps install failed"

        download_core "gir1.2-gstreamer-1.0_1.26.2-2_arm64.deb"
        download_core "gir1.2-gst-plugins-base-1.0_1.26.2-1_arm64.deb"
        download_core "gir1.2-gst-plugins-bad-1.0_1.26.2-3_arm64.deb"
        download_core "gstreamer1.0-tools_1.26.2-2_arm64.deb"
        download_core "gstreamer1.0-plugins-base_1.26.2-1_arm64.deb"
        download_core "gstreamer1.0-plugins-good_1.26.2-1_arm64.deb"
        download_core "gstreamer1.0-alsa_1.26.2-1_arm64.deb"
        download_core "gstreamer1.0-gtk3_1.26.2-1_arm64.deb"
        download_core "gstreamer1.0-pulseaudio_1.26.2-1_arm64.deb"
        download_core "gstreamer1.0-x_1.26.2-1_arm64.deb"
        download_core "gstreamer1.0-plugins-bad_1.26.2-3_arm64.deb"
        download_core "gstreamer1.0-plugins-ugly_1.26.3-4_arm64.deb"
        download_core "libgstreamer-plugins-base1.0-0_1.26.2-1_arm64.deb"
        download_core "libgstreamer-gl1.0-0_1.26.2-1_arm64.deb"
        download_core "libgstreamer-plugins-bad1.0-0_1.26.2-3_arm64.deb"
        download_core "libgstreamer1.0-0_1.26.2-2_arm64.deb"

        install_debs

        # =========================================================
        # OMX
        # =========================================================
        display_alert "Installing GStreamer OMX (Allwinner)" "${BOARD}" "info"

        download_core "gst-omx-listcomponents_1.18.3-1_arm64.deb"
        download_core "gstreamer1.0-omx-allwinner_1.18.3-1.1_arm64.deb"
        download_core "gstreamer1.0-omx-allwinner-config_1.18.3-1.1_arm64.deb"

        install_debs

        # =========================================================
        # FREEZE GSTREAMER STACK (prevent upgrades/downgrades)
        # =========================================================
        display_alert "Freezing GStreamer packages" "${BOARD}" "info"

        chroot "${SDCARD}" apt-mark hold \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-tools \
            gstreamer1.0-alsa \
            gstreamer1.0-gtk3 \
            gstreamer1.0-pulseaudio \
            gstreamer1.0-x \
            libgstreamer1.0-0 \
            libgstreamer-plugins-base1.0-0 \
            libgstreamer-plugins-bad1.0-0 \
            libgstreamer-gl1.0-0 \
            gir1.2-gstreamer-1.0 \
            gir1.2-gst-plugins-base-1.0 \
            gir1.2-gst-plugins-bad-1.0

        # =========================================================
        # UDEV FIX (critical for VE access)
        # =========================================================
        mkdir -p "${SDCARD}/lib/udev/rules.d"

        cat > "${SDCARD}/lib/udev/rules.d/99-sunxi-ve.rules" << 'EOF'
ACTION=="add" SUBSYSTEM=="dma_heap" KERNEL=="system" TAG+="uaccess"
ACTION=="add" SUBSYSTEM=="cedar_ve" TAG+="uaccess"
ACTION=="add" SUBSYSTEM=="cedar_ve2" TAG+="uaccess"
EOF

        # =========================================================
        # GLMARK2
        # =========================================================
        display_alert "Installing glmark2" "${BOARD}" "info"

        download_core "glmark2-data_2023.01+dfsg-3_all.deb"
        download_core "glmark2-es2-x11_2023.01+dfsg-3_arm64.deb"

        install_debs

    fi

    display_alert "GPU stack installation complete" "${BOARD}" "info"
}


function write_uboot_platform() {
    local SCRIPT_DIR="$1"
    local DEVICE="$2"

    dd conv=notrunc,fsync status=none if="$SCRIPT_DIR/boot0_sdcard.bin" of="$DEVICE" bs=512 seek=256
    dd conv=notrunc,fsync status=none if="$SCRIPT_DIR/boot0_ufs.bin" of="$DEVICE" bs=512 seek=2064
    dd conv=notrunc,fsync status=none if="$SCRIPT_DIR/boot_package.fex" of="$DEVICE" bs=512 seek=24576
    
    sfdisk --part-label "$DEVICE" 1 "bootloader"
    
    sync "${DEVICE}"  
}


family_tweaks() {
	# execute specific tweaks function if present
	[[ $(type -t family_tweaks_s) == function ]] && family_tweaks_s
	
	# KMSCON does not start until login screen appears. Turn on splash.
	if [[ "${BRANCH}" == "legacy" && -f "${SDCARD}/boot/armbianEnv.txt" ]]; then
    		if grep -q '^bootlogo' "${SDCARD}/boot/armbianEnv.txt"; then
        		sed -i 's/^bootlogo.*/bootlogo=true/' "${SDCARD}/boot/armbianEnv.txt"
    		else
        		echo 'bootlogo=true' >> "${SDCARD}/boot/armbianEnv.txt"
    		fi
	fi
	echo "galcore" >> "${SDCARD}"/etc/modules
	cp -R "${SRC}"/packages/blobs/sunxi/sun60iw2/logo.bmp "${SDCARD}"/boot
	echo "ramdisk_file=${NAME_INITRD}" >> "${SDCARD}"/boot/armbianEnv.txt
	echo "extraargs=clk_ignore_unused mac_addr=${mac} coherent_pool=2M irqchip.gicv3_pseudo_nmi=0 kasan=off no_console_suspend fsck.fix=yes fsck.repair=yes net.ifnames=0" >> "${SDCARD}"/boot/armbianEnv.txt
	
	if [[ "${BOARD}" == "radxa-cubie-a7z" || "${BOARD}" == "radxa-cubie-a7z-ufs" ]]; then
    		use_clean_environment="yes" chroot_sdcard "sed -i 's/^#[[:space:]]*ZRAM_PERCENTAGE=.*/ZRAM_PERCENTAGE=200/' /etc/default/armbian-zram-config"
    		use_clean_environment="yes" chroot_sdcard "sed -i 's/^#[[:space:]]*MEM_LIMIT_PERCENTAGE=.*/MEM_LIMIT_PERCENTAGE=200/' /etc/default/armbian-zram-config"
	fi
}
