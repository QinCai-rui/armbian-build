function write_uboot_platform() {
    local SCRIPT_DIR="$1"
    local DEVICE="$2"

    dd conv=notrunc,fsync status=none if="$SCRIPT_DIR/boot0_sdcard.bin" of="$DEVICE" bs=512 seek=256
    dd conv=notrunc,fsync status=none if="$SCRIPT_DIR/boot0_ufs.bin" of="$DEVICE" bs=512 seek=2064
    dd conv=notrunc,fsync status=none if="$SCRIPT_DIR/boot_package.fex" of="$DEVICE" bs=512 seek=24576
    sync "${DEVICE}"
    
    # Boot splash broken on kernel 6.18
    if [[ "${BRANCH}" != "edge" ]]; then
    		sfdisk --part-label "$DEVICE" 1 "primary"
	fi
}


family_tweaks() {
	# execute specific tweaks function if present
	[[ $(type -t family_tweaks_s) == function ]] && family_tweaks_s
	
	# KMSCON does not start until login screen appears. Turn on splash.
	if [[ "${BRANCH}" == "legacy" && -f "${SDCARD}/boot/armbianEnv.txt" ]]; then
    		if grep -q '^bootlogo' "${SDCARD}/boot/armbianEnv.txt"; then
        		sed -i 's/^bootlogo.*/bootlogo=true/' "${SDCARD}/boot/armbianEnv.txt"
    		else
        		echo 'bootlogo=true' >> "${SDCARD}/boot/armbianEnv.txt"
    		fi
	fi
	
	if [[ "${BRANCH}" == "edge" && "${UBOOTVERSION}" == "legacy" ]]; then
		# 1. Convert Image to a flat binary vmlinux (NOT an ELF)
		echo "Converting Image to raw binary vmlinux..."
		local objcopy_tool="${SRC}/toolchains/gcc-arm-9.2-2019.12-x86_64-aarch64-none-linux-gnu/bin/aarch64-none-linux-gnu-objcopy"
		[[ ! -f "${objcopy_tool}" ]] && objcopy_tool="aarch64-linux-gnu-objcopy"

		$objcopy_tool -I binary -O binary \
			"${SDCARD}/boot/Image" "${SDCARD}/boot/vmlinux"

		# 2. Patch uInitrd header so 32-bit Radxa U-Boot accepts it
		# Armbian usually symlinks or renames the u-boot formatted file to /boot/uInitrd
		if [[ -f "${SDCARD}/boot/uInitrd" ]]; then
			echo "Patching uInitrd: Changing AArch64 to ARM for Radxa U-Boot compatibility..."
			printf '\x02' | dd of="${SDCARD}/boot/uInitrd" bs=1 seek=29 count=1 conv=notrunc status=none
		fi
	fi
	
	echo "extraargs=mac_addr=${mac} coherent_pool=2M irqchip.gicv3_pseudo_nmi=0 cgroup_enable=cpuset cgroup_memory=1 swapaccount=1 kasan=off no_console_suspend fsck.fix=yes fsck.repair=yes net.ifnames=0" >> "${SDCARD}"/boot/armbianEnv.txt
	
	cp -R "${SRC}"/packages/blobs/sunxi/sun60iw2/logo.bmp "${SDCARD}"/boot
	
	echo "ramdisk_file=${NAME_INITRD}" >> "${SDCARD}"/boot/armbianEnv.txt
	
	echo "serialcon=${SERIALCON}" >> "${SDCARD}"/boot/armbianEnv.txt
	
	if [[ "${BOARD}" == "radxa-cubie-a7z" || "${BOARD}" == "radxa-cubie-a7z-ufs" ]]; then
    		use_clean_environment="yes" chroot_sdcard "sed -i 's/^#[[:space:]]*ZRAM_PERCENTAGE=.*/ZRAM_PERCENTAGE=150/' /etc/default/armbian-zram-config"
    	use_clean_environment="yes" chroot_sdcard "sed -i 's/^#[[:space:]]*MEM_LIMIT_PERCENTAGE=.*/MEM_LIMIT_PERCENTAGE=150/' /etc/default/armbian-zram-config"
	fi
}


function post_family_tweaks__install_aic8800_usb_firmware() {
    [[ "${BRANCH}" != "edge" ]] && return 0
    display_alert "$BOARD" "Installing AIC8800 USB firmware (edge only)" "info"

    local version="4.0+git20250410.b99ca8b6-4"
    local fw_deb_name="aic8800-firmware_${version}_all.deb"
    local fw_url="https://github.com/radxa-pkg/aic8800/releases/download/${version}/${fw_deb_name}"
    local tmp_dir=$(mktemp -d)

    display_alert "$BOARD" "Downloading AIC8800 firmware ${version}" "info"
    wget -q "${fw_url}" -O "${tmp_dir}/${fw_deb_name}" || {
        rm -rf "${tmp_dir}"
        exit_with_error "Failed to download AIC8800 firmware deb"
    }

    display_alert "$BOARD" "Extracting AIC8800 USB firmware" "info"
    dpkg-deb -x "${tmp_dir}/${fw_deb_name}" "${tmp_dir}/extracted"

    local src_fw_dir="${tmp_dir}/extracted/lib/firmware/aic8800_fw/USB"

    if [[ -d "${src_fw_dir}" ]]; then
        display_alert "$BOARD" "Deploying AIC8800 USB firmware to /lib/firmware/" "info"
        rm -rf "${SDCARD}/lib/firmware/aic8800D80"
        rm -rf "${SDCARD}/lib/firmware/aic8800_fw"
        cp -r "${src_fw_dir}/aic8800D80" "${SDCARD}/lib/firmware/"
    else
        rm -rf "${tmp_dir}"
        exit_with_error "AIC8800 USB firmware source directory not found in package"
    fi

    rm -rf "${tmp_dir}"

    display_alert "$BOARD" "Adding AIC8800 modules to /etc/modules" "info"
    for mod in "aic_load_fw" "aic8800_fdrv" "aic8800_btusb"; do
        grep -qxF "$mod" "${SDCARD}/etc/modules" || echo "$mod" >> "${SDCARD}/etc/modules"
    done
}
