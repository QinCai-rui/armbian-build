        ;;
        
	vendor)
		KERNELSOURCE="${GITHUB_SOURCE}/radxa/kernel.git"
		KERNELBRANCH="branch:allwinner-aiot-linux-6.6"
		declare -g KERNEL_MAJOR_MINOR="6.6"
