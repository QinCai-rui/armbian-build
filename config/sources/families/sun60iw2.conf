declare -g LINUXFAMILY="sun60iw2"
declare -g ARCH="arm64"
declare -g ATF_COMPILE='no'
declare -g BOOTENV_FILE='sun60iw2.txt'
declare -g BOOTSCRIPT='boot-sun60iw2.cmd:boot.cmd'
declare -g OVERLAY_DIR="/boot/dtb/allwinner/overlay"
declare -g EXTRAWIFI="no"
declare -g KERNEL_BTF="no"
declare -g INSTALL_HEADERS="yes"

case "${BRANCH}" in
    legacy)
        KERNELSOURCE="${GITHUB_SOURCE}/radxa/kernel.git"
        KERNELBRANCH="branch:allwinner-aiot-linux-5.15"
		declare -g KERNEL_MAJOR_MINOR="5.15"
		KERNELPATCHDIR="archive/sun60iw2-${BRANCH}"

        ALLWINNER_BSP_SOURCE="${GITHUB_SOURCE}/radxa/allwinner-bsp"
		BSPBRANCH="branch:cubie-aiot-v1.4.6"
		
		ALLWINNER_DEVICE_SOURCE="${GITHUB_SOURCE}/radxa/allwinner-device"
		DEVICEBRANCH="branch:device-a733-v1.4.6"

		LINUXCONFIG="linux-sun60iw2-${BRANCH}"
		NAME_INITRD="initrd.img-5.15.147-legacy-sun60iw2"
		declare -g SERIALCON="ttyAS0"
			
		enable_extension "radxa-aic8800"
		AIC8800_TYPE="usb"
		
        ;;
        
	vendor)
		KERNELSOURCE="${GITHUB_SOURCE}/radxa/kernel.git"
		KERNELBRANCH="branch:allwinner-aiot-linux-6.6"
		declare -g KERNEL_MAJOR_MINOR="6.6"
		KERNELPATCHDIR="archive/sun60iw2-${BRANCH}"
		
		ALLWINNER_BSP_SOURCE="${GITHUB_SOURCE}/radxa/allwinner-bsp"
		BSPBRANCH="branch:cubie-aiot-v1.4.8"
		
		ALLWINNER_DEVICE_SOURCE="${GITHUB_SOURCE}/radxa/allwinner-device"
		DEVICEBRANCH="branch:device-a733-v1.4.8"
		
		LINUXCONFIG="linux-sun60iw2-${BRANCH}"
		NAME_INITRD="initrd.img-6.6.98-vendor-sun60iw2"
		declare -g SERIALCON="ttyAS0"
		
		enable_extension "radxa-aic8800"
		AIC8800_TYPE="usb"
		
		;;
		
	edge)
		KERNELSOURCE="${GITHUB_SOURCE}/NickAlilovic/allwinner-linux-6.18.git"
		KERNELBRANCH="branch:allwinner-linux-6.18"
		KERNEL_MAJOR_MINOR="6.18"
		KERNELPATCHDIR="archive/sun60iw2-${BRANCH}"
		
		ALLWINNER_BSP_SOURCE="${GITHUB_SOURCE}/NickAlilovic/allwinner-bsp"
		BSPBRANCH="branch:linux-6.18.y"
		
		LINUXCONFIG="linux-sun60iw2-${BRANCH}"
		NAME_INITRD="initrd.img-6.18.19-edge-sun60iw2"
		declare -g SERIALCON="ttyS0"
		
		# U-boot versions "mainline" and "legacy"
		UBOOTVERSION="legacy"
		
		;;
esac


function build_custom_uboot() {
    display_alert "Building custom U-Boot for ${BOARD}" "${BOARD}" "info"

    # --- Determine package config based on branch/version ---
    local pkg_name="u-boot-aw2501"
    local repo_slug="radxa-pkg/u-boot-aw2501"
    local vendor_internal_path="usr/lib/u-boot/radxa-cubie-a7a"  # path inside vendor deb

    if [[ "${BRANCH}" == "edge" && "${UBOOTVERSION}" == "mainline" ]]; then
        pkg_name="u-boot-dlan17"
        repo_slug="radxa-pkg/u-boot-dlan17"
        vendor_internal_path="usr/lib/u-boot/radxa-cubie-a7s"
        BOOTSCRIPT='boot-sun60iw2-next.cmd:boot.cmd'
    fi

    # --- Sanity check caller-provided vars ---
    [[ -z "${uboottempdir:-}" ]] && exit_with_error "UBOOT: uboottempdir is not set by caller"
    [[ -z "${uboot_name:-}"   ]] && exit_with_error "UBOOT: uboot_name is not set by caller"

    # --- Resolve .deb: local blob or GitHub release ---
    local local_blob_dir="${SRC}/packages/blobs/sunxi/sun60iw2"
    local local_blob
    local_blob=$(ls "${local_blob_dir}/${pkg_name}"*.deb 2>/dev/null | head -n 1)
    local DOWNLOAD_DIR=""
    local DEB_VENDOR_BLOB=""

    if [[ -f "${local_blob}" ]]; then
        display_alert "Using local blob: $(basename "${local_blob}")" "${BOARD}" "info"
        DEB_VENDOR_BLOB="${local_blob}"
    else
        display_alert "Local blob not found, fetching latest release from GitHub" "${BOARD}" "info"

        local api_url="https://api.github.com/repos/${repo_slug}/releases/latest"
        local latest_version
        latest_version=$(curl -s "${api_url}" | jq -r '.tag_name')

        [[ -z "${latest_version}" || "${latest_version}" == "null" ]] && \
            exit_with_error "UBOOT: could not fetch latest version from GitHub (${repo_slug})"

        local download_url="https://github.com/${repo_slug}/releases/download/${latest_version}/${pkg_name}_${latest_version}_all.deb"

        DOWNLOAD_DIR=$(mktemp -d)
        DEB_VENDOR_BLOB="${DOWNLOAD_DIR}/${pkg_name}_${latest_version}_all.deb"

        display_alert "Downloading ${pkg_name} ${latest_version}" "${BOARD}" "info"
        wget -q "${download_url}" -O "${DEB_VENDOR_BLOB}" || {
            rm -rf "${DOWNLOAD_DIR}"
            exit_with_error "UBOOT: failed to download vendor .deb from ${download_url}"
        }
    fi

    # --- Extract .deb ---
    local vendortmp
    vendortmp=$(mktemp -d)

    ( cd "${vendortmp}" && dpkg-deb -x "${DEB_VENDOR_BLOB}" . ) || {
        rm -rf "${vendortmp}" "${DOWNLOAD_DIR}"
        exit_with_error "UBOOT: failed to extract vendor .deb: ${DEB_VENDOR_BLOB}"
    }

    [[ -n "${DOWNLOAD_DIR}" ]] && rm -rf "${DOWNLOAD_DIR}"

    # --- Copy boot binaries: vendor path -> uboot_name path (what platform_install.sh expects) ---
    local srcdir="${vendortmp}/${vendor_internal_path}"
    local destdir="${uboottempdir}/usr/lib/${uboot_name}"

    if [[ ! -d "${srcdir}" ]]; then
        rm -rf "${vendortmp}"
        exit_with_error "UBOOT: vendor package layout not found at ${srcdir} for board ${BOARD}"
    fi

    mkdir -p "${destdir}"

    local required_files=("boot0_sdcard.bin" "boot0_ufs.bin" "boot_package.fex")
    local found_any=false

    for filename in "${required_files[@]}"; do
        if [[ -f "${srcdir}/${filename}" ]]; then
            if cp "${srcdir}/${filename}" "${destdir}/"; then
                display_alert "Copied ${filename}" "${BOARD}" "info"
                found_any=true
            else
                display_alert "Failed to copy ${filename} to ${destdir}" "${BOARD}" "err"
            fi
        else
            display_alert "Boot binary missing from vendor package: ${filename}" "${BOARD}" "wrn"
        fi
    done

    rm -rf "${vendortmp}"

    [[ "${found_any}" == "false" ]] && \
        exit_with_error "UBOOT: no boot binaries found in ${srcdir} — aborting"

    declare -g EXTENSION_BUILT_UBOOT="yes"
    display_alert "U-Boot build complete for ${BOARD}" "${BOARD}" "info"
    return 0
}


function kernel_copy_extra_sources__radxa_allwinner_bsp() {
    display_alert "$BOARD" "Retrieving latest Radxa Allwinner BSP (Board Support Package)" "info"

    allwinner_bsp_git_bare_tree="${SRC}/cache/git-bare/allwinner-bsp"
    declare allwinner_bsp_git_bare_tree_done_marker="${allwinner_bsp_git_bare_tree}/.git/armbian-bare-tree-done"

    if [ ! -d "${allwinner_bsp_git_bare_tree}" ] || [ ! -f "${allwinner_bsp_git_bare_tree_done_marker}" ]; then
        if [[ -d "${allwinner_bsp_git_bare_tree}" ]]; then
            rm -rf "${allwinner_bsp_git_bare_tree}"
        fi

        run_host_command_logged git clone --tags --no-checkout \
            "${ALLWINNER_BSP_SOURCE}" "${allwinner_bsp_git_bare_tree}"

        touch "${allwinner_bsp_git_bare_tree_done_marker}"
    fi

    git_ensure_safe_directory "${allwinner_bsp_git_bare_tree}"

    GIT_FIXED_WORKDIR="${LINUXSOURCEDIR}/bsp" \
        GIT_BARE_REPO_FOR_WORKTREE="${allwinner_bsp_git_bare_tree}" \
        GIT_BARE_REPO_INITIAL_BRANCH="${BSPBRANCH#*:}" \
        fetch_from_repo "${ALLWINNER_BSP_SOURCE}" "allwinner_bsp:${KERNEL_MAJOR_MINOR}" "${BSPBRANCH}" "yes"

    local expected_dir="${kernel_work_dir}/bsp"
    local wait_count=0
    while [[ ! -d "${expected_dir}/configs" ]] && [[ $wait_count -lt 60 ]]; do
        display_alert "Waiting for BSP files to appear" "Wait time: $((wait_count * 2))s" "info"
        sleep 2
        wait_count=$((wait_count + 1))
    done
    
    CURRENT_BSP_HASH=$(git ls-remote "${ALLWINNER_BSP_SOURCE}" "${BSPBRANCH#*:}" | awk '{print $1}' | cut -c1-10)
    
    local PATCH_ARCHIVE_DIR="${SRC}/patch/kernel/archive/sun60iw2-${BRANCH}"
	local EXISTING_BSP_FILE=""
	local EXISTING_BSP_HASH=""
	if compgen -G "${PATCH_ARCHIVE_DIR}/0011-Add-BSP-support-files-"*.patch > /dev/null; then
    		EXISTING_BSP_FILE=$(basename "$(ls "${PATCH_ARCHIVE_DIR}/0011-Add-BSP-support-files-"*.patch 2>/dev/null | head -n 1)")
    		EXISTING_BSP_HASH=$(echo "${EXISTING_BSP_FILE}" | grep -oP 'files-\K[a-f0-9]+(?=\.patch)')
	fi
    
    local PATCH_TARGET_DIR="${SRC}/patch/kernel/archive/sun60iw2-${BRANCH}"
    mkdir -p "${PATCH_TARGET_DIR}"
    
    local PATCH_NAME="0011-Add-BSP-support-files-${CURRENT_BSP_HASH}.patch"
    local FULL_PATCH_PATH="${PATCH_TARGET_DIR}/${PATCH_NAME}"

    if [[ -f "${FULL_PATCH_PATH}" ]] || [[ -n "${CURRENT_BSP_HASH}" && "${CURRENT_BSP_HASH}" == "${EXISTING_BSP_HASH}" ]]; then
        display_alert "$BOARD" "BSP patch for hash ${CURRENT_BSP_HASH} exists. Skipping." "info"
        return 0
    fi
    
    display_alert "$BOARD" "New remote state detected (${CURRENT_BSP_HASH}). Updated patches stored in ${FULL_PATCH_PATH}" "info"
    rm -f "${PATCH_TARGET_DIR}/0010-BSP-Autogen-File.patch"
    rm -f "${PATCH_TARGET_DIR}"/0011-Add-BSP-support-files-*.patch

    if [[ -d "${expected_dir}" ]]; then
        run_host_command_logged cp "${expected_dir}"/configs/linux-${KERNEL_MAJOR_MINOR}/*.dtsi "${kernel_work_dir}"/arch/arm64/boot/dts/allwinner
        run_host_command_logged cp -r "${expected_dir}"/include/dt-bindings/. "${kernel_work_dir}"/include/dt-bindings

        local insert_text="\
export BSP_TOP := bsp/\n\
export LICHEE_KERN_DIR := ./\n\
export KBUILD_DEFCONFIG := bsp.config\n\
"
        sed -i "/# expect to learn how to build the kernel reading this file./a\\
${insert_text}" "${kernel_work_dir}/Makefile"

		local bsp_patch_file="${PATCH_TARGET_DIR}/0010-BSP-Autogen-File.patch"
        local autogen_content="#define AW_BSP_VERSION \"${CURRENT_BSP_HASH}, $(date "+%Y-%m-%d %H:%M:%S"), RadxaOS SDK\""
        mkdir -p "${expected_dir}/include"
        echo "${autogen_content}" > "${expected_dir}/include/sunxi-autogen.h"
        
        display_alert "$BOARD" "Generating 0010-BSP-Autogen-File.patch" "info"
        (
        		{  
            		echo "--- /dev/null"
            		echo "+++ b/bsp/include/sunxi-autogen.h"
            		echo "@@ -0,0 +1 @@"
            		echo "+${autogen_content}"  
        		} > "${bsp_patch_file}"
        	
        		display_alert "$BOARD" "Generating ${PATCH_NAME}" "info"
            cd "${kernel_work_dir}" || exit_with_error "Failed to cd to kernel_work_dir"
            git config user.email "support@armbian.com"
            git config user.name "Armbian Builder"

            git add Makefile
            git add arch/arm64/boot/dts/allwinner/*.dtsi
            git add include/dt-bindings/
            
            git commit -m "Add BSP support files ${CURRENT_BSP_HASH}"
            git format-patch -1 --stdout > "${FULL_PATCH_PATH}"
            
            git reset --hard HEAD~1
            git clean -fd
        ) || exit_with_error "BSP patch generation failed"
    else
        display_alert "Radxa Allwinner BSP not found." "${BOARD}" "err"
    fi
}


function kernel_copy_extra_sources__radxa_allwinner_device() {
    display_alert "$BOARD" "Retrieving latest Radxa Allwinner Device" "info"
    
    	if [[ "${BRANCH}" == "edge" ]]; then
    		local CURRENT_REMOTE_HASH="${CURRENT_BSP_HASH}"
	else
	    	local REMOTE_BRANCH_NAME="${DEVICEBRANCH#*:}"
    		local CURRENT_REMOTE_HASH=$(git ls-remote "${ALLWINNER_DEVICE_SOURCE}" "refs/heads/${REMOTE_BRANCH_NAME}" | awk '{print substr($1,1,10)}')
    
    		if [[ -z "${CURRENT_REMOTE_HASH}" ]]; then
        		display_alert "$BOARD" "Could not retrieve remote hash for ${REMOTE_BRANCH_NAME}. Proceeding with caution." "err"
    		fi
	fi	

    local PATCH_ARCHIVE_DIR="${SRC}/patch/kernel/archive/sun60iw2-${BRANCH}"
    local EXISTING_PATCH_FILE=""
    local EXISTING_PATCH_HASH=""
    if compgen -G "${PATCH_ARCHIVE_DIR}/0012-Add-Allwinner-Device-a733-"*.patch > /dev/null; then
        EXISTING_PATCH_FILE=$(basename "$(ls "${PATCH_ARCHIVE_DIR}/0012-Add-Allwinner-Device-a733-"*.patch 2>/dev/null | head -n 1)")
        EXISTING_PATCH_HASH=$(echo "${EXISTING_PATCH_FILE}" | grep -oP 'a733-\K[a-f0-9]+(?=\.patch)')
    fi

    local PATCH_TARGET_DIR="${SRC}/patch/kernel/archive/sun60iw2-${BRANCH}"
    mkdir -p "${PATCH_TARGET_DIR}"
    
    local PATCH_NAME="0012-Add-Allwinner-Device-a733-${CURRENT_REMOTE_HASH}.patch"
    local FULL_PATCH_PATH="${PATCH_TARGET_DIR}/${PATCH_NAME}"

    if [[ -f "${FULL_PATCH_PATH}" ]] || [[ -n "${CURRENT_REMOTE_HASH}" && "${CURRENT_REMOTE_HASH}" == "${EXISTING_PATCH_HASH}" ]]; then
        display_alert "$BOARD" "Device patch for hash ${CURRENT_REMOTE_HASH} exists. Skipping." "info"
        return 0
    fi

    display_alert "$BOARD" "New remote state detected (${CURRENT_REMOTE_HASH}). Updated patch stored in ${FULL_PATCH_PATH}" "info"
    rm -f "${PATCH_TARGET_DIR}"/0012-Add-Allwinner-Device-a733*.patch
    
    	if [[ "${BRANCH}" != "edge" ]]; then
	    allwinner_device_git_bare_tree="${SRC}/cache/git-bare/allwinner-device"
	    declare allwinner_device_git_bare_tree_done_marker="${allwinner_device_git_bare_tree}/.git/armbian-bare-tree-done"

	    if [ ! -d "${allwinner_device_git_bare_tree}" ] || [ ! -f "${allwinner_device_git_bare_tree_done_marker}" ]; then
	        if [[ -d "${allwinner_device_git_bare_tree}" ]]; then
	            rm -rf "${allwinner_device_git_bare_tree}"
	        fi
	        run_host_command_logged git clone --tags --no-checkout \
	            "${ALLWINNER_DEVICE_SOURCE}" "${allwinner_device_git_bare_tree}"
	        touch "${allwinner_device_git_bare_tree_done_marker}"
	    fi

	    git_ensure_safe_directory "${allwinner_device_git_bare_tree}"

	    GIT_FIXED_WORKDIR="allwinner-device" \
	        GIT_BARE_REPO_FOR_WORKTREE="${allwinner_device_git_bare_tree}" \
	        GIT_BARE_REPO_INITIAL_BRANCH="${REMOTE_BRANCH_NAME}" \
	        fetch_from_repo "${ALLWINNER_DEVICE_SOURCE}" "allwinner_device:${KERNEL_MAJOR_MINOR}" "${DEVICEBRANCH}" "yes"
    
	    local expected_dir="${SRC}/cache/sources/allwinner-device"
    
	    local wait_count=0
	    while [[ ! -d "${expected_dir}/configs" ]] && [[ $wait_count -lt 60 ]]; do
	    display_alert "Waiting for Device files" "Wait time: $((wait_count * 2))s" "info"
	        sleep 2
	        wait_count=$((wait_count + 1))
	    done
	    
	    if [[ -d "${expected_dir}" ]]; then
        		run_host_command_logged cp "${expected_dir}/configs/cubie_a7a/linux-${KERNEL_MAJOR_MINOR}/board.dts" "${kernel_work_dir}/arch/arm64/boot/dts/allwinner/sun60i-a733-cubie-a7a.dts"
        		run_host_command_logged cp "${expected_dir}/configs/cubie_a7s/linux-${KERNEL_MAJOR_MINOR}/board.dts" "${kernel_work_dir}/arch/arm64/boot/dts/allwinner/sun60i-a733-cubie-a7s.dts"
        		run_host_command_logged cp "${expected_dir}/configs/cubie_a7z/linux-${KERNEL_MAJOR_MINOR}/board.dts" "${kernel_work_dir}/arch/arm64/boot/dts/allwinner/sun60i-a733-cubie-a7z.dts"
        		run_host_command_logged cp "${expected_dir}/configs/default/linux-${KERNEL_MAJOR_MINOR}/bsp_defconfig" "${kernel_work_dir}/arch/arm64/configs/bsp.config"
        else
        		display_alert "Radxa Allwinner Device not found." "${BOARD}" "err"
    		fi
	else
		local expected_dir="${kernel_work_dir}/bsp"
		
		if [[ -d "${expected_dir}" ]]; then
        		run_host_command_logged cp "${expected_dir}/configs/linux-${KERNEL_MAJOR_MINOR}/*.dts*" "${kernel_work_dir}/arch/arm64/boot/dts/allwinner/"
        else
        		display_alert "Radxa Allwinner Device not found." "${BOARD}" "err"
    		fi
    fi
    
    display_alert "$BOARD" "Generating ${PATCH_NAME}" "info"
    (
        cd "${kernel_work_dir}" || exit_with_error "Failed to cd to kernel_work_dir"
        git config user.email "support@armbian.com"
        git config user.name "Armbian Builder"
        git add .
        git commit -m "Add Allwinner Device a733 ${CURRENT_REMOTE_HASH}"
        git format-patch -1 --stdout > "${FULL_PATCH_PATH}"
            
        git reset --hard HEAD~1
        git clean -fd
    ) || exit_with_error "Device patch generation failed"
}


function post_family_tweaks__install_kmscon_console() {
    display_alert "Installing KMSCON (KMS/DRM-based system console)" "${BOARD}" "info"

    local HOST_DEB_PATH="${SRC}/packages/blobs/sunxi/sun60iw2"
    local TMP_DEB_DIR="/tmp/kmscon_debs"
    local TARGET_WANTS_DIR="/etc/systemd/system/getty.target.wants"
    local TARGET_SERVICE_FILE="/usr/lib/systemd/system/kmsconvt@.service"
    local OVERRIDE_DIR="${SDCARD}/etc/systemd/system/kmsconvt@tty1.service.d"

    # --- Install runtime dependencies ---
    chroot "$SDCARD" /bin/bash <<- 'EOF'
        set -e
        apt-get update
        apt-get install -y --no-install-recommends \
            libegl1 libgbm1 libgles2 \
            libpango-1.0-0 libpangoft2-1.0-0 libxkbcommon0
EOF
    [[ $? -ne 0 ]] && exit_with_error "KMSCON: failed to install runtime dependencies"

    # --- Try package manager first, fall back to local debs ---
    chroot "$SDCARD" /bin/bash <<- 'EOF'
        . /etc/os-release

        if apt-get install -y --no-install-recommends libtsm4 kmscon 2>/dev/null; then
            echo "KMSCON: installed from default repos"
        elif [[ "$VERSION_CODENAME" == "trixie" ]]; then
            echo "KMSCON: on trixie, trying backports..."
            echo "deb http://deb.debian.org/debian trixie-backports main" \
                > /etc/apt/sources.list.d/trixie-backports.list
            apt-get update
            apt-get install -y --no-install-recommends -t trixie-backports libtsm4 kmscon \
                && echo "KMSCON: installed from trixie-backports" \
                || exit 2
            rm -f /etc/apt/sources.list.d/trixie-backports.list
        else
            echo "KMSCON: not available on ${VERSION_CODENAME}, signalling fallback"
            exit 2
        fi
EOF

    local chroot_exit=$?
    if [[ $chroot_exit -eq 2 ]]; then
        display_alert "KMSCON: falling back to local .deb packages" "${BOARD}" "wrn"

        mkdir -p "${SDCARD}${TMP_DEB_DIR}"
        cp "${HOST_DEB_PATH}/kmscon_9.2.1-1_arm64.deb"  "${SDCARD}${TMP_DEB_DIR}/"
        cp "${HOST_DEB_PATH}/libtsm4_4.3.0-1_arm64.deb" "${SDCARD}${TMP_DEB_DIR}/"

        chroot "$SDCARD" /bin/bash <<- EOF
            set -e
            cd ${TMP_DEB_DIR}
            dpkg -i *.deb
            rm -rf ${TMP_DEB_DIR}
EOF

        [[ $? -ne 0 ]] && exit_with_error "KMSCON: local .deb install also failed"

    elif [[ $chroot_exit -ne 0 ]]; then
        exit_with_error "KMSCON: failed to install kmscon"
    fi

    # --- Configure systemd ---
    mkdir -p "${SDCARD}${TARGET_WANTS_DIR}"
    mkdir -p "$OVERRIDE_DIR"

    chroot "$SDCARD" /bin/bash -c "
        set -e
        rm -f '${TARGET_WANTS_DIR}/getty@tty1.service'
        ln -sf '${TARGET_SERVICE_FILE}' '${TARGET_WANTS_DIR}/kmsconvt@tty1.service'
        ln -sf '${TARGET_SERVICE_FILE}' '/etc/systemd/system/autovt@.service'
    " || exit_with_error "KMSCON: failed to configure systemd symlinks"

    cat > "${OVERRIDE_DIR}/override.conf" <<- 'EOF'
[Service]
ExecStart=
ExecStart=-/usr/bin/kmscon --vt tty1 --login -- /bin/bash --login
EOF

    display_alert "KMSCON installed and configured successfully" "${BOARD}" "info"
}


function post_family_tweaks__install_powervr_desktop() {
    display_alert "Installing PowerVR BXM Driver & Mesa Main" "${BOARD}" "info"
    echo "powervr" >> "${SDCARD}/etc/modules"

    # =====================================
    # Firmware Placement & Initramfs Hook
    # =====================================
    mkdir -p "${SDCARD}/lib/firmware/powervr/"
    FW_SRC="${SRC}/packages/blobs/sunxi/sun60iw2/rogue_36.56.104.183_v1.fw"
    [[ ! -f "${FW_SRC}" ]] && return 1
    cp -av "${FW_SRC}" "${SDCARD}/lib/firmware/powervr/"

    mkdir -p "${SDCARD}/etc/initramfs-tools/hooks"
    cat <<-'EOF' > "${SDCARD}/etc/initramfs-tools/hooks/powervr-firmware"
#!/bin/sh
PREREQ=""
prereqs() { echo "$PREREQ"; }
case "$1" in prereqs) prereqs; exit 0 ;; esac
. /usr/share/initramfs-tools/hook-functions

mkdir -p "${DESTDIR}/lib/firmware/powervr"
cp -a /lib/firmware/powervr/* "${DESTDIR}/lib/firmware/powervr/" 2>/dev/null || true
EOF

    chmod +x "${SDCARD}/etc/initramfs-tools/hooks/powervr-firmware"
    use_clean_environment="yes" chroot_sdcard "update-initramfs -u -k all"

    # =====================================
    # Mesa build dependencies
    # =====================================
    local BLOB_DIR="${SRC}/packages/blobs/sunxi/sun60iw2"
    local MESA_DEB="${BLOB_DIR}/mesa-powervr-custom_aarch64.deb"

    if [[ ! -f "${MESA_DEB}" ]]; then
        use_clean_environment="yes" chroot_sdcard "
            set -e
            apt-get update
		apt-get install -y \
			meson ninja-build build-essential git ca-certificates \
			python3-mako python3-jinja2 python3-ply \
			libdrm-dev libgbm-dev libegl-dev pkg-config \
			libvulkan-dev libudev-dev libwayland-dev wayland-protocols \
			llvm-dev libclang-dev libclc-19-dev \
			glslang-tools libglvnd-dev \
			libllvmspirvlib-19-dev libdisplay-info-dev libexpat1-dev \
			libwayland-egl-backend-dev \
			libx11-xcb-dev libxext-dev libxxf86vm-dev \
			libxcb1-dev libxcb-randr0-dev libxcb-glx0-dev \
			libxcb-shm0-dev libxcb-sync-dev libxcb-present-dev \
			libxcb-dri2-0-dev libxcb-dri3-dev libxcb-keysyms1-dev \
			libxshmfence-dev \
			libxrandr-dev libxfixes-dev libxdamage-dev \
			zstd libzstd-dev

            rm -rf /tmp/mesa
            git clone --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git /tmp/mesa
            cd /tmp/mesa

            meson setup build \
                --prefix=/usr \
                --libdir=lib/aarch64-linux-gnu \
                -Dplatforms=x11,wayland \
                -Dgallium-drivers=llvmpipe,zink \
                -Dvulkan-drivers=imagination \
                -Dimagination-srv=true \
                -Dbuildtype=release \
                -Db_ndebug=true \
                -Dllvm=enabled \
                -Dglvnd=true \
                -Dgbm=enabled \
                -Dopengl=true \
                -Dgles1=enabled \
                -Dgles2=enabled \
                -Degl=enabled \
                -Dshader-cache=enabled \
                -Dzstd=enabled

            ninja -C build
            DESTDIR=/tmp/mesa-install ninja -C build install

            rm -rf /tmp/mesa-install/usr/include
            rm -rf /tmp/mesa-install/usr/lib/aarch64-linux-gnu/pkgconfig

            DEB_ROOT=/tmp/mesa-deb
            mkdir -p \${DEB_ROOT}/DEBIAN
            cp -a /tmp/mesa-install/. \${DEB_ROOT}/

            INST_SIZE=\$(du -sk \${DEB_ROOT} | cut -f1)

            cat <<EOF > \${DEB_ROOT}/DEBIAN/control
Package: mesa-powervr-custom
Version: 99.0.0-powervr1
Architecture: arm64
Maintainer: Armbian Build <build@armbian.com>
Depends: libglvnd0
Provides: libgl1-mesa-dri, libglx-mesa0, libegl-mesa0, libgbm1, libgl1, libglx0, libegl1, libgles2
Conflicts: libgl1-mesa-dri, libglx-mesa0, libegl-mesa0
Replaces: libgl1-mesa-dri, libglx-mesa0, libegl-mesa0, libgbm1
Installed-Size: \${INST_SIZE}
Description: Mesa built from source for PowerVR BXM (Zink path)
EOF

            dpkg-deb --build --root-owner-group \${DEB_ROOT} /tmp/mesa-powervr-custom_aarch64.deb
        "

        cp -v "${SDCARD}/tmp/mesa-powervr-custom_aarch64.deb" "${MESA_DEB}"
    fi

    # =====================================
    # SAFE PURGE (only stock Mesa)
    # =====================================
    use_clean_environment="yes" chroot_sdcard "
        apt-get purge -y \
            libgl1-mesa-dri libglx-mesa0 libegl-mesa0 \
            mesa-vulkan-drivers mesa-vdpau-drivers mesa-va-drivers \
            libgles1 || true

        apt-get autoremove -y || true
    "

    # =====================================
    # Install custom Mesa
    # =====================================
    cp -v "${MESA_DEB}" "${SDCARD}/tmp/"
    use_clean_environment="yes" chroot_sdcard "
        dpkg -i --force-overwrite /tmp/mesa-powervr-custom_aarch64.deb
        ldconfig
        rm -f /tmp/mesa-powervr-custom_aarch64.deb
    "

    # =====================================
    # Apt pin
    # =====================================
    cat <<-'EOF' > "${SDCARD}/etc/apt/preferences.d/mesa-custom"
Package: libgl1-mesa-dri libglx-mesa0 libegl-mesa0
Pin: release *
Pin-Priority: -1
EOF

    # =====================================
    # Reinstall desktop stack
    # =====================================
    display_alert "Reinstalling desktop stack" "${BOARD}" "info"

    use_clean_environment="yes" chroot_sdcard "
        apt-get install -y --no-install-recommends \
            libglvnd0 libgl1 libglx0 libegl1 libgles2 \
            xserver-xorg xserver-xorg-core xwayland foot kmscon \
            chromium gnome-system-monitor network-manager-gnome \
            libxcb-keysyms1 mesa-utils vulkan-tools vkmark \
            zenity \
        || true

        apt-get install -f -y || true
    "

    # =====================================
    # Xorg config
    # sunxi-drm is a display-only controller with no render node.
    # AccelMethod none — glamor/Zink caused severe GPU performance
    # degradation (vkmark 98 vs 520) and pvr_cccb firmware warnings.
    # Desktop uses llvmpipe (CPU), GPU is fully free for Vulkan apps.
    # AutoAddGPU disabled to prevent etnaviv/NPU being picked as
    # primary device. BusID pins card0 (sunxi-drm) as display output.
    # Default resolution set to 1920x1080 — board has only 1GB RAM.
    # =====================================
    mkdir -p "${SDCARD}/etc/X11/xorg.conf.d"
    cat <<-'EOF' > "${SDCARD}/etc/X11/xorg.conf.d/20-powervr.conf"
Section "ServerFlags"
    Option "AutoAddGPU" "false"
EndSection

Section "Monitor"
    Identifier  "HDMI-1"
    Option      "PreferredMode" "1920x1080"
EndSection

Section "Device"
    Identifier  "PowerVR-BXM"
    Driver      "modesetting"
    BusID       "platform:soc@3000000:sunxi-drm"
    Option      "AccelMethod" "none"
EndSection

Section "Screen"
    Identifier  "Default Screen"
    Device      "PowerVR-BXM"
    Monitor     "HDMI-1"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
        Modes   "1920x1080"
    EndSubSection
EndSection
EOF

    # =====================================
    # LightDM — PVR flag injected into xserver-command so
    # Vulkan apps work without manual export.
    # No glamor EGL vars needed — AccelMethod is none.
    # =====================================
    cat <<-'EOF' >> "${SDCARD}/etc/lightdm/lightdm.conf"

[Seat:*]
xserver-command=env PVR_I_WANT_A_BROKEN_VULKAN_DRIVER=1 X
EOF

    # =====================================
    # Global environment — PVR flag so vkmark/vulkaninfo
    # work from any terminal without manual export.
    # =====================================
    cat <<-'EOF' >> "${SDCARD}/etc/environment"
PVR_I_WANT_A_BROKEN_VULKAN_DRIVER=1
EOF

    # Per-user XDG_RUNTIME_DIR via profile.d so vulkaninfo/vkmark
    # work from any terminal on first login without manual export
    cat <<-'EOF' > "${SDCARD}/etc/profile.d/xdg-runtime.sh"
#!/bin/sh
export XDG_RUNTIME_DIR=/run/user/$(id -u)
EOF
    chmod +x "${SDCARD}/etc/profile.d/xdg-runtime.sh"

    display_alert "PowerVR + Mesa setup complete" "${BOARD}" "info"
}


