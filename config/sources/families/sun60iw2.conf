NoDisplay=true
EOF

    cat <<-'EOF' > "${SDCARD}/usr/local/bin/offer-sway-install.sh"
#!/bin/bash
# Only run once per user
[ -f "$HOME/.sway-offer-done" ] && exit 0
touch "$HOME/.sway-offer-done"

# Wait for desktop to settle
sleep 5

# Requires zenity for GUI dialog
if ! command -v zenity > /dev/null 2>&1; then
