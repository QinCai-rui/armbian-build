EOF
    chmod +x "${SDCARD}/usr/local/bin/install-sway-desktop.sh"

    # =====================================
    # Offer sway install via XFCE autostart (graphical dialog)
    # Runs once on first graphical login via zenity popup
    # =====================================
    mkdir -p "${SDCARD}/etc/xdg/autostart"
    cat <<-'EOF' > "${SDCARD}/etc/xdg/autostart/offer-sway-install.desktop"
[Desktop Entry]
Type=Application
Name=Offer Sway Install
Exec=/usr/local/bin/offer-sway-install.sh
